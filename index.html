function showMusicSelect(callback) {
  screenState = 'musicselect';
  const trackList = Object.entries(TRACKS); // [[key, {src,loop,title}], ...]
  let focusRow = 0;
  let autoPlay = false;

  const ov = document.getElementById('overlay');
  ov.style.justifyContent = '';
  ov.style.overflowY = 'auto';

  // Returns a callback that advances from fromIdx to the next track.
  // Using a factory avoids relying on bgmKey (which is cleared before the callback fires).
  function makePlayNext(fromIdx) {
    return function() {
      if (!autoPlay || screenState !== 'musicselect') return;
      const nextIdx = (fromIdx + 1) % trackList.length;
      focusRow = nextIdx;
      playMusic(trackList[nextIdx][0], null, true); // forceOnce so loop tracks end
      bgmEndCallback = makePlayNext(nextIdx);
      render();
    };
  }

  function startTrack(idx) {
    focusRow = idx;
    const key = trackList[idx][0];
    if (bgmKey === key) {
      stopMusic();
      bgmEndCallback = null;
    } else {
      playMusic(key, null, autoPlay); // forceOnce when autoPlay is on
      if (autoPlay) bgmEndCallback = makePlayNext(idx);
    }
    render();
  }

  function render() {
    const rows = trackList.map(([key, t], i) => {
      const playing = bgmKey === key;
      const num = String(i + 1).padStart(2, '0');
      return `<div class="ms-row" id="ms-row-${i}" data-key="${key}" style="
        display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;user-select:none;
        ${playing ? 'background:rgba(255,215,0,0.09);' : ''}">
        <span style="color:${playing ? '#ffd700' : '#334455'};font-size:13px;width:14px;flex-shrink:0;">${playing ? '▶' : ''}</span>
        <span style="font-family:'Courier New',monospace;font-size:11px;color:#556677;flex-shrink:0;width:22px;">${num}</span>
        <span style="flex:1;font-size:12px;color:${playing ? '#ffd700' : '#aaccff'};text-align:left;">${t.title}</span>
        <span style="font-size:9px;color:#445566;letter-spacing:1px;flex-shrink:0;">${t.loop ? 'LOOP' : 'ONCE'}</span>
      </div>`;
    }).join('');

    const apActive = autoPlay;
    ov.innerHTML = `
      <div style="text-align:center;padding:14px 16px 18px;width:100%;max-width:320px;">
        <div style="font-size:9px;letter-spacing:4px;color:#6688aa;margin-bottom:4px;">SOUND ROOM</div>
        <div style="font-size:20px;letter-spacing:4px;color:#ffd700;margin-bottom:12px;">MUSIC SELECT</div>
        <div style="border:1px solid rgba(255,215,0,0.2);margin-bottom:12px;">${rows}</div>
        <div style="display:flex;gap:8px;justify-content:center;align-items:center;">
          <button id="ms-autoplay" style="padding:6px 14px;font-size:11px;letter-spacing:1px;margin-top:0;
            background:${apActive ? '#1a3a1a' : '#162244'};
            border:1px solid ${apActive ? '#44cc44' : '#446'};
            color:${apActive ? '#44ee44' : '#aaccff'};
            font-family:inherit;cursor:pointer;">
            AUTO PLAY ${apActive ? 'ON' : 'OFF'}
          </button>
          <button id="ms-back" style="padding:6px 20px;font-size:11px;letter-spacing:2px;margin-top:0;
            background:#223366;color:#ffd700;border:1px solid #ffd700;
            font-family:inherit;cursor:pointer;">BACK</button>
        </div>
      </div>`;
    ov.style.display = 'flex';

    trackList.forEach(([key], i) => {
      const el = document.getElementById(`ms-row-${i}`);
      if (!el) return;
      el.onmouseenter = () => { if (!el.classList.contains('kf')) el.style.background = 'rgba(255,215,0,0.05)'; };
      el.onmouseleave = () => { if (!el.classList.contains('kf')) el.style.background = bgmKey === key ? 'rgba(255,215,0,0.09)' : ''; };
      el.onclick = () => startTrack(i);
    });

    document.getElementById('ms-autoplay').onclick = () => {
      autoPlay = !autoPlay;
      if (autoPlay) {
        // If a track is currently playing, restart it as forceOnce so it ends and advances
        const curKey = bgmKey;
        const curIdx = trackList.findIndex(([k]) => k === curKey);
        if (curKey && bgmAudio && !bgmAudio.ended && curIdx >= 0) {
          playMusic(curKey, null, true);
          bgmEndCallback = makePlayNext(curIdx);
          focusRow = curIdx;
        }
      } else {
        bgmEndCallback = null;
        // Restore looping for a loop track that was playing in forceOnce mode
        const curKey = bgmKey;
        if (curKey && TRACKS[curKey]?.loop && bgmAudio) {
          bgmAudio.loop = true; // restore looping
        }
      }
      render();
      // Keep focus on the autoplay button row
      focusRow = trackList.length;
      setupFocusMS();
    };

    document.getElementById('ms-back').onclick = () => {
      bgmEndCallback = null;
      stopMusic();
      callback();
    };

    setupFocusMS();
  }

  function setupFocusMS() {
    const rowEls = trackList.map((_, i) => document.getElementById(`ms-row-${i}`));
    const apBtn  = document.getElementById('ms-autoplay');
    const backBtn = document.getElementById('ms-back');
    fgSetup([...rowEls.map(el => [el]), [apBtn, backBtn]], focusRow, 0);
  }

  render();
}

function showTitle() {
  const mainCount = MAIN_STAGES.length;
  const pracCount = PRACTICE_STAGES.length;
  let mainIdx = 0, pracIdx = 0;

  const subBtn = (id, label, extra = '') =>
    `<button id="${id}" style="padding:5px 14px;font-size:11px;letter-spacing:1px;margin-top:0;
      background:#162244;border:1px solid #446;color:#aaccff;
      font-family:inherit;cursor:pointer;${extra}">${label}</button>`;
  const navBtn = (id, label) =>
    `<button id="${id}" style="width:26px;height:26px;padding:0;font-size:12px;margin-top:0;
      background:#162244;border:1px solid #446;color:#aaccff;cursor:pointer;">${label}</button>`;
  const goBtn = (id, label = '▶ START') =>

      font-family:inherit;cursor:pointer;">${label}</button>`;

  const ov = document.getElementById('overlay');
  ov.style.justifyContent = 'flex-start';
  ov.style.overflowY = 'hidden';
  ov.innerHTML = `
    <img src="images/Title.png"
      style="width:100%;display:block;image-rendering:pixelated;flex-shrink:0;">
    <div style="width:100%;padding:8px 8px 12px;text-align:center;">

      <!-- Row 0: START GAME -->
      <div style="margin-bottom:10px;">
        <button id="start-btn">START GAME</button>
      </div>

      <!-- Row 1-2: stage selectors (table for reliable column + vertical alignment) -->
      <table style="margin:0 auto 10px;border-collapse:separate;border-spacing:6px 6px;">
        <tr>
          <td style="font-size:9px;color:#88aacc;text-align:right;letter-spacing:1px;vertical-align:middle;white-space:nowrap;">MAIN</td>
          <td style="vertical-align:middle;">${navBtn('main-prev','◄')}</td>
          <td id="main-num" style="font-size:14px;font-family:'Courier New',monospace;color:#ffd700;text-align:center;vertical-align:middle;width:26px;">1</td>
          <td style="vertical-align:middle;">${navBtn('main-next','►')}</td>
          <td style="vertical-align:middle;">${goBtn('main-go')}</td>
        </tr>
        <tr>
          <td style="font-size:9px;color:#6688aa;text-align:right;letter-spacing:1px;vertical-align:middle;white-space:nowrap;">PRACTICE</td>
          <td style="vertical-align:middle;">${navBtn('prac-prev','◄')}</td>
          <td id="prac-num" style="font-size:14px;font-family:'Courier New',monospace;color:#aaccff;text-align:center;vertical-align:middle;width:26px;">1</td>
          <td style="vertical-align:middle;">${navBtn('prac-next','►')}</td>
          <td style="vertical-align:middle;">${goBtn('prac-go')}</td>
        </tr>
      </table>

      <!-- Row 3: gameplay sub-menu -->
      <div style="display:flex;gap:6px;justify-content:center;margin-bottom:6px;">
        ${subBtn('howto-btn', 'HOW TO PLAY')}
        ${subBtn('ranking-btn', 'RANKING')}
      </div>
      <!-- Row 4: settings sub-menu -->
      <div style="display:flex;gap:6px;justify-content:center;">
        ${subBtn('keyconfig-btn', 'KEY CONFIG')}
        ${subBtn('soundroom-btn', 'SOUND ROOM')}
      </div>
    </div>
  `;
  ov.style.display = 'flex';
  screenState = 'title';

  function startGame() {
    showScenarioText({ text: OPENING_TEXT, music: 'opening', onDone: () => initGame(0, false) });
  }
  function mainPrev() { mainIdx = (mainIdx - 1 + mainCount) % mainCount; document.getElementById('main-num').textContent = mainIdx + 1; }
  function mainNext() { mainIdx = (mainIdx + 1) % mainCount; document.getElementById('main-num').textContent = mainIdx + 1; }
  function mainGo()   { initGame(mainIdx, false); }
  function pracPrev() { pracIdx = (pracIdx - 1 + pracCount) % pracCount; document.getElementById('prac-num').textContent = pracIdx + 1; }
  function pracNext() { pracIdx = (pracIdx + 1) % pracCount; document.getElementById('prac-num').textContent = pracIdx + 1; }
  function pracGo()   { initGame(pracIdx, true); }
  function howto()    { showHowToPlay(showTitle); }
  function ranking()  { showHiScoreScreen(0, showTitle); }
  function keyconfig(){ showKeyConfig(showTitle); }
  function soundroom(){ showMusicSelect(showTitle); }

  titleActions = { startGame, howto, ranking, keyconfig, soundroom, mainPrev, mainNext, mainGo, pracPrev, pracNext, pracGo };

  // Wire buttons
  document.getElementById('start-btn').onclick     = startGame;
  document.getElementById('howto-btn').onclick      = howto;
  document.getElementById('ranking-btn').onclick    = ranking;
  document.getElementById('keyconfig-btn').onclick  = keyconfig;
  document.getElementById('soundroom-btn').onclick  = soundroom;
  document.getElementById('main-prev').onclick      = mainPrev;
  document.getElementById('main-next').onclick      = mainNext;
  document.getElementById('main-go').onclick        = mainGo;
  document.getElementById('prac-prev').onclick      = pracPrev;
  document.getElementById('prac-next').onclick      = pracNext;
  document.getElementById('prac-go').onclick        = pracGo;

  // Hover styles for sub buttons
  ['howto-btn','ranking-btn','keyconfig-btn','soundroom-btn'].forEach(id => {

    el.onmouseenter = () => { if (!el.classList.contains('kf')) el.style.background = '#1f3055'; };
    el.onmouseleave = () => { if (!el.classList.contains('kf')) el.style.background = '#162244'; };

  // 2D focus grid:
  //   row 0: [start-btn]
  //   row 1: [main-prev, main-next, main-go]
  //   row 2: [prac-prev, prac-next, prac-go]
  //   row 3: [howto-btn, ranking-btn]
  //   row 4: [keyconfig-btn, soundroom-btn]
  fgSetup([
    [document.getElementById('start-btn')],
    [document.getElementById('main-prev'), document.getElementById('main-next'), document.getElementById('main-go')],
    [document.getElementById('prac-prev'), document.getElementById('prac-next'), document.getElementById('prac-go')],
    [document.getElementById('howto-btn'), document.getElementById('ranking-btn')],
    [document.getElementById('keyconfig-btn'), document.getElementById('soundroom-btn')],
  ], 0, 0);  // default: START GAME

  gameOver = true;
  playMusic('title');
}

// Start render loop — show title with stage selector
initKeyCfg();
gameOver = true;
paused = false;
grid = Array.from({length:ROWS}, () => new Array(COLS).fill(0));
piece = null;
nextPiece = null;
score = 0; stage = 0;
requestAnimationFrame(ts => { lastTime = ts; update(ts); });

// --- Viewport scaling ---
// Fits the entire app into the available browser window (both up and down).
// CSS zoom affects layout flow (unlike transform:scale), so no overflow occurs.
function scaleMobile() {
  const APP_W = CW + 16 + 106; // 518
  const app = document.getElementById('app');
  app.style.zoom = ''; // reset first so offsetHeight reflects natural size
  const APP_H = app.offsetHeight || CH;
  const PAD = 16; // breathing room (px, each side combined)
  const scale = Math.min(
    (window.innerWidth  - PAD) / APP_W,
    (window.innerHeight - PAD) / APP_H
  );
  if (Math.abs(scale - 1) >= 0.02) app.style.zoom = scale;
}
scaleMobile();
window.addEventListener('resize', scaleMobile);
// Prevent page scroll / bounce on touch devices
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// --- Stage clear skip / pause resume: tap / click on canvas ---
function canvasTap() {
  if (screenState !== 'game') return;
  if (cleared && performance.now() >= clearSkipAt) {
    bgmEndCallback = null; nextStage();
  }
}
canvas.addEventListener('click', canvasTap);
canvas.addEventListener('touchstart', e => {
  if (screenState !== 'game') return;
  if (!paused && cleared && performance.now() >= clearSkipAt) {
    e.preventDefault();
    canvasTap();
  }
}, { passive: false });

// --- Virtual Gamepad ---
(function setupVpad() {
  const MENU_STATES = ['title','keyconfig','howto','musicselect','hiscore','overlay'];

  function vpAction(act) {
    // Menu navigation
    if (MENU_STATES.includes(screenState)) {
      if (act === 'up')    { fgMove(-1, 0); return; }
      if (act === 'down')  { fgMove(1, 0);  return; }
      if (act === 'left')  { fgMove(0, -1); return; }
      if (act === 'right') { fgMove(0, 1);  return; }
      if (act === 'rot')   { fgClick(); return; }
      if (act === 'trn' || act === 'pause') {
        if (screenState === 'howto')        document.getElementById('howto-back-btn')?.click();
        else if (screenState === 'hiscore') document.getElementById('hs-continue-btn')?.click();
        else if (screenState === 'overlay') document.getElementById('ov-title')?.click();
        else if (screenState === 'keyconfig') document.getElementById('kc-back')?.click();
        else if (screenState === 'musicselect') document.getElementById('ms-back')?.click();
        return;
      }
    }
    // Scenario / story text
    if (screenState === 'scenario') {
      if (act === 'rot' || act === 'trn') document.getElementById('overlay')?.click();
      return;
    }
    if (screenState !== 'game' || gameOver) return;

    // Pause toggle (always available in game)
    if (act === 'pause') { togglePause(); return; }
    if (paused) return;

    // Stage clear: confirm to advance
    if (cleared) {
      if (act === 'rot' && performance.now() >= clearSkipAt) {
        bgmEndCallback = null; nextStage();
      }
      return;
    }
    const busy = clearParticles.length > 0 || pendingSpawn || !piece;
    if (busy || paused || waitingForMusic) return;

    if (act === 'left')  { if (canPlace(pieceRow, pieceCol-1, piece)) { pieceCol--; sfx('move'); } }
    if (act === 'right') { if (canPlace(pieceRow, pieceCol+1, piece)) { pieceCol++; sfx('move'); } }
    if (act === 'rot')   { rotatePiece(); }
    if (act === 'trn')   { transformPiece(); }
    // 'down' is handled via softDrop flag directly in event listeners
  }

  // Auto-repeat for left/right (250ms delay, 80ms interval — like keyboard repeat)
  let _vrTimer = null;
  function vrStart(act) {
    vpAction(act);
    _vrTimer = setTimeout(() => {
      _vrTimer = setInterval(() => vpAction(act), 80);
    }, 250);
  }
  function vrStop() {
    clearTimeout(_vrTimer);
    clearInterval(_vrTimer);
    _vrTimer = null;
  }

  document.querySelectorAll('[data-vact]').forEach(btn => {
    const act = btn.dataset.vact;

    if (act === 'down') {
      // Hold = softDrop in game; tap = cursor down in menus
      const press = e => {
        e.preventDefault();
        if (screenState === 'game' && !gameOver) softDrop = true;
        else vpAction('down');
      };
      const release = e => { e.preventDefault(); softDrop = false; };
      btn.addEventListener('touchstart',  press,   { passive: false });
      btn.addEventListener('touchend',    release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });
      btn.addEventListener('mousedown',   press);
      btn.addEventListener('mouseup',     release);
      btn.addEventListener('mouseleave',  release);
    } else if (act === 'left' || act === 'right') {
      // Directional with auto-repeat
      const press = e => { if (e.cancelable) e.preventDefault(); vrStart(act); };
      const release = e => { if (e.cancelable) e.preventDefault(); vrStop(); };
      btn.addEventListener('touchstart',  press,   { passive: false });
      btn.addEventListener('touchend',    release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });
      btn.addEventListener('mousedown',   press);
      btn.addEventListener('mouseup',     release);
      btn.addEventListener('mouseleave',  release);
    } else {
      // Single-fire buttons (up, rot, trn, pause)
      btn.addEventListener('touchstart', e => { e.preventDefault(); vpAction(act); }, { passive: false });
      btn.addEventListener('click', () => vpAction(act));
    }
  });
})();
